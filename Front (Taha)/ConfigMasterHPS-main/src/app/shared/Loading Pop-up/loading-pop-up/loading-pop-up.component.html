<div class="loading-dialog">
    <div class="dialog-overlay"></div>
    
    <div class="dialog-container">
      <div class="dialog-header">
        <h3 class="dialog-title">{{ data.message || 'Processing...' }}</h3>
        <button *ngIf="testCompleted" 
                class="close-button"
                (click)="dialogRef.close()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
  
      <div class="dialog-body">
        <div class="main-progress">
          <div class="progress-bar">
            <div class="progress-fill" [style.width.%]="overallProgress"></div>
          </div>
        </div>
  
        <div class="steps-container">
          <div *ngFor="let step of steps; let i = index" 
               class="step-item"
               [class.active-step]="i === currentStepIndex">
            <div class="step-indicator">
              <i *ngIf="i < currentStepIndex" class="bi bi-check-lg"></i>
              <span *ngIf="i >= currentStepIndex">{{ i + 1 }}</span>
            </div>
  
            <div class="step-content">
              <div class="step-header">
                <span class="step-title">{{ step.title }}</span>
                <span class="step-status">{{ getStepStatus(i) }}</span>
              </div>
              <div class="step-progress">
                <div class="progress-fill" [style.width.%]="getStepProgress(i)"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
