<div class="custom-dialog-container">
    <div class="dialog-header">
      <h2 class="dialog-title">{{ data.title }}</h2>
    </div>
    
    <div class="dialog-content">
      <p class="dialog-message">{{ data.message }}</p>
      
      <div class="alert alert-danger mt-3" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>
    </div>
    
    <div class="dialog-actions">
      <button type="button" class="btn btn-secondary" [disabled]="processing" (click)="onCancel()">
        {{ data.cancelButtonText }}
      </button>
      <button type="button" class="btn btn-danger" [disabled]="processing" (click)="onConfirm()">
        <span *ngIf="processing" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
        {{ data.confirmButtonText }}
      </button>
    </div>
  </div>
