<!--
  Note: We’ve omitted the <html>, <head> and <body> tags, 
  since in Angular the component template just holds the modal markup.
-->
<div
  #backdrop
  class="modal-backdrop"
  (click)="onBackdropClick($event)"
>
  <div class="modal-container">
    <!-- Content area -->
    <div class="mat-dialog-content">
      <div class="form__group field">
        <input
          id="inputText"
          class="form__field"
          type="text"
          required
          placeholder=" "
          [(ngModel)]="inputText"
          (input)="onInput($event)"
        />
        <label class="form__label" for="inputText">
          Description
        </label>
      </div>
    </div>

    <!-- Actions area -->
    <div class="mat-dialog-actions">
      <button
        class="modern-btn btn-cancel"
        (click)="handleCancel()"
      >
        Cancel
      </button>
      <button
        class="modern-btn btn-primary"
        [disabled]="!inputText.trim()"
        (click)="handleSubmit()"
      >
        OK
      </button>
    </div>
  </div>
</div>
